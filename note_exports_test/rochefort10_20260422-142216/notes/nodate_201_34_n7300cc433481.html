<h2 name="jbvF2">要旨</h2><p name="SDnE0">* ドキュメントには、文中に使用されている用語と、それらが使われている場所を示すリストである「索引」が必要である<br>* 読み手からしたら当然だが、作成者はそのことを忘れがちである<br>* ドキュメント中の情報の素早い検索、後の保守運用には索引は必須である<br>* 文章作成ツールの索引作成機能を有効に活用しよう</p><h2 name="xR2Na">解説</h2><p name="UPEpE">原理33「どの文書にも用語集が必要だ」と、言いたいことは一緒だろう。</p><p name="jEScs">読み手のことを考えて文書を作成しよう。</p><p name="4Wr8x">実は一度も自分が作成したドキュメントの索引を作成したことは、ないが。</p><p name="aLdmZ"><br></p>
