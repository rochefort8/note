<h2 name="GbOsy">要旨</h2><p name="Y0pMA">* if文を入れ子（ネスティング、nesting) すると、論理構造はシンプルになる<br>* が、入れ子の段数（深さ）を3以上にすると、理解しにくくなる<br>* 入れ子の深さを減らすための技法を適用しよう</p><h2 name="QFIlZ">解説</h2><p name="a35uR">良いコーディングの基本原則「読みやすい」。ネスティングも、ある段数以上いくと、論理構造を追跡するのが途端に難しくなる。それに、エディターの右に寄って見づらくなる、というのもある。</p><p name="ZLYjA">その段数は、いろんな文献や意見を見ると「3段」のようだ。</p><p name="KGC92">ネストを減らすための技法は、この記事が、わかりやすい。</p><figure embedded-service="external-article" contenteditable="false" name="ytzLk" embedded-content-key="emb7fa9fc6e6275">
