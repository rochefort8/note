<p name="dLVtO">子貢問曰「有一言而可以終身行之者乎。」<br>子曰 「其恕乎。己所不欲、勿施於人。」<br></p><p name="m8ihE">「人生で、これさえ守っていれば良い、という一言の言葉はありますか」の問いに対して、孔子先生のお答えが「恕」。</p><p name="IA6bY">この一言の意味をわかりやすくいうと、「思いやり」。</p><p name="5we7A">ネガティブな表現だと、「自分がされたくないことは人にはしてはならない」<br>ポシティブな表現だと「他を受け容れ、認め、許し、その気持を思いやり<br>自分のことと同じように人のことを考える」<br></p><p name="LXuny">人生にしても仕事にしても、最も大事なことであるのは、間違いない。</p><p name="vEyuD"><br></p><p name="eoBme"><br></p>
