<h2 name="uCxhC">要旨</h2><p name="4vVLv">* ツールは便利だが、使い方や効果を知らないで使うのは危険である<br>* ツールを使う前に、技術や使い方をまず学び、訓練を受けよ<br>* ツールでやりたいことを、まずは「手動で」やってみて、ひととおり理解してうまく動くことを確認するのがよい、手動でできなければツールでもできない</p><h2 name="rM7bH">解説</h2><p name="m4oqS">ツールを盲目的に信じるな<br>ツールは技術の穴埋めをするものではない<br>ヘタに使うと、かえってひどいことになる</p><p name="KIELn">ツールは、上手に使えば大変便利なものなので、ちゃんと知った上で使いましょうね、ということ。</p><p name="7fzHM">ツール自体にバグがあることも、ある。ツール自体が絶対的に信用できるもの、などとだれが言えようか。</p><p name="YMjcx"><br></p>
